<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <rect width="800" height="450" fill="#1a0a2e"/>
  <rect x="20" y="20" width="760" height="410" rx="16" fill="#2d1457" stroke="#00d4aa" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="400" y="160" font-family="sans-serif" font-size="48" fill="#00d4aa" text-anchor="middle">🎨</text>
  <text x="400" y="220" font-family="sans-serif" font-size="22" fill="#ffffff" text-anchor="middle" font-weight="bold">Illustration Loading...</text>
  <text x="400" y="260" font-family="sans-serif" font-size="14" fill="#a0a0c0" text-anchor="middle">The story continues while the image is painted!</text>
  <circle cx="400" cy="340" r="6" fill="#ff6b9d">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.2s" repeatCount="indefinite" begin="0s"/>
  </circle>
  <circle cx="426" cy="340" r="6" fill="#00d4aa">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.2s" repeatCount="indefinite" begin="0.4s"/>
  </circle>
  <circle cx="452" cy="340" r="6" fill="#ffd700">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.2s" repeatCount="indefinite" begin="0.8s"/>
  </circle>
</svg>
